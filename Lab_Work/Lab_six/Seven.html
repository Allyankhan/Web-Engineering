<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 7</title>
</head>
<body>
    <script>
        
function getData() {
    return new Promise((resolve, reject) => {
        setTimeout(() => {
            resolve("Data received");
        }, 2000);
    });
}

async function fetchData() {
    try {
        const result = await getData();   // wait for promise
        console.log(result);
    } 
    catch (error) {
        console.log("Error:", error);
    }
}

fetchData();
        
    </script>
    
</body>
</html>
