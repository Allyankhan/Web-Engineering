<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASK 5</title>
</head>
<body>
    <script>
        function getData() {
    
    return new Promise((resolve, reject) => {
        setTimeout(() => {
            let success = true; 
            
            if (success) {
                resolve({ name: "Ali", role: "Student" }); 
            } else {
                reject("Error: Could not fetch data!"); 
            }
        }, 2000); 
    });
}


getData()
    .then((data) => {
        console.log("Promise resolved with data:", data);
    })
    .catch((error) => {
        console.error(error);
    });
    </script>
    
</body>
</html>
